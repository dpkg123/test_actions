name: ci
on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:
  push:
  pull_request:
  workflow_call:
  
jobs:
  live-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, ubuntu-22.04-arm, ubuntu-24.04-arm, macos-latest]
     
    
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:

    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '8'
    - name: Install Node.js
      uses: actions/setup-node@v7
      with:
         node-version: 24
    - name: Install Python
      uses: actions/setup-python@v7
      with:
        python-version: 3.14
    - uses: actions/setup-go@v7
      with:
        go-version: '^1.26' 
        cache: false
    - name: Commit updates
      continue-on-error: true
      run: |
        sleep $[ ( $RANDOM % 10 )  + 1 ]
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git config --global --add safe.directory /github/workspace
        git pull --rebase
        for i in {1..256}; do printf "#define DATE $(date)\n\n" > 1.y && git add . && git commit -m "$(date)" --author "dpkg123 <test1@qw5d.onmicrosoft.com>" && sleep $((RANDOM % 15 + 1)) ; done

    - name: GitHub Push
      continue-on-error: true
      uses: ad-m/github-push-action@master
      with:
        force: true
        github_token: ${{ secrets.GITHUB_TOKEN }}
