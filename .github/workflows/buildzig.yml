name: build cli

on:

  workflow_dispatch:
  push:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    container: ubuntu:focal
    permissions:
      contents: read
    steps:

    #- name: clean
    #  uses: rokibhasansagar/slimhub_actions@main
        
    - name: Install package
      run: apt update && DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC apt install -y git libxml2-dev libbz2-dev libssl-dev zlib1g-dev gcc g++ binutils libstdc++-10-dev libstdc++-9-dev ninja-build cmake libzstd-dev && uname -a
  
    - name: "Checkout Repo"
      uses: actions/checkout@v6
      with: 
        repository: Frain-Breeze/teatimetools
        #repository: mos9527/mages-tools
        fetch-depth: 2
        submodules: true

    - name: Checkout build files
      run: git config --global --add safe.directory /__w/test_actions/test_actions && git submodule update --init

    - name: configure
      run: |
        mkdir out
        cd out
        cmake .. -GNinja 
    - name: Build
      run: |        
        ninja -C out -v 
    - uses: actions/upload-artifact@v7
      with:
        name: out
        path: out
